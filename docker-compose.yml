services:
  krs-service:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8002:8000"
    depends_on:
      krs-db:
        condition: service_healthy
    networks:
      - iae-network

  krs-db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: krs_service
      MYSQL_USER: krs_user
      MYSQL_PASSWORD: krs_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "33062:3306"
    volumes:
      - krs-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - iae-network

networks:
  iae-network:
    name: iae-network
    driver: bridge

volumes:
  krs-db-data:
